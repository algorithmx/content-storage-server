services:
  content-storage-server:
    build: .
    container_name: content-storage-server
    restart: unless-stopped
    ports:
      - "${PORT:-8081}:8082"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 2s
      retries: 3
      start_period: 4s
