  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication via header. Required when ENABLE_AUTH=true.
    ApiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API key authentication via query parameter. Alternative to X-API-Key header.
